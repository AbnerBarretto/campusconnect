<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | CampusConnect</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Gradiente exato do background do Figma */
        --bg-gradient: linear-gradient(
          108deg,
          #93acee 0%,
          #7695f3 34%,
          #60b7f1 68%,
          #4ccff1 100%
        );
        --text-main: #0f172a;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-gradient);
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .main-container {
        width: 100%;
        height: 100vh;
        background: #ffffff;
        display: flex;
        border-radius: 0;
        overflow: hidden;
        box-shadow: none;
      }

      .image-side {
        width: 52%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }

      .image-side img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .form-side {
        width: 48%;
        height: 100%;
        padding: 64px 80px;
        display: flex;
        flex-direction: column;
        background: white;
        justify-content: center;
      }

      @media (max-width: 768px) {
        .main-container {
          flex-direction: column;
          height: 100vh;
          max-width: 100%;
          border-radius: 0;
        }
        .image-side {
          width: 100%;
          height: 40%;
        }
        .form-side {
          width: 100%;
          height: 60%;
          padding: 40px 30px;
          overflow-y: auto;
        }
      }

      .custom-input {
        width: 100%;
        background-color: #f3f4f6;
        border: 2px solid transparent;
        border-radius: 12px;
        padding: 16px 20px;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s ease;
      }

      .custom-input:focus {
        background-color: #ffffff;
        border-color: #000000;
        outline: none;
      }

      /* Switch Toggle do Figma */
      .switch {
        width: 32px;
        height: 18px;
        background: #e5e7eb;
        border-radius: 20px;
        position: relative;
        cursor: pointer;
      }
      .switch::after {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        background: white;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: 0.2s;
      }

      .btn-primary {
        background-color: #1a73e8;
        color: white;
        font-weight: 700;
        padding: 16px;
        border-radius: 12px;
        width: 100%;
        box-shadow: 0 10px 20px rgba(26, 115, 232, 0.2);
      }

      .btn-google {
        background-color: #2d2e32;
        color: white;
        font-weight: 700;
        padding: 16px;
        border-radius: 12px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .logo-container {
        display: flex;
        align-items: center;
        gap: 3;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .logo-container svg {
        transition: all 0.3s ease;
      }

      .logo-container:hover svg {
        transform: scale(1.15);
        filter: drop-shadow(0 4px 12px rgba(26, 115, 232, 0.4));
      }

      .logo-container:hover svg path,
      .logo-container:hover svg rect {
        stroke: #1a73e8;
        fill: #e8f1ff;
      }

      .logo-container:hover h1 {
        color: #1a73e8;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="image-side">
        <!-- Imagem de estudantes livre de direitos -->
        <img
          src="https://images.unsplash.com/photo-1552664730-d307ca884978?q=80&w=2000&auto=format&fit=crop"
          alt="Estudantes Campus"
        />
      </div>

      <div class="form-side">
        <div class="logo-container flex items-center gap-3 mb-16">
          <svg width="48" height="48" viewBox="0 0 100 100" fill="none">
            <path
              d="M20 50V20H80V80H50"
              stroke="black"
              stroke-width="14"
              stroke-linecap="square"
            />
            <path
              d="M40 40L60 60"
              stroke="black"
              stroke-width="14"
              stroke-linecap="square"
            />
            <rect x="20" y="40" width="15" height="20" fill="white" />
          </svg>
          <h1 class="text-lg font-black tracking-tighter uppercase">
            CampusConnect
          </h1>
        </div>

        <h2 class="text-[30px] font-black tracking-tight text-gray-900 mb-8">
          Bem-vindo de volta
        </h2>

        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
          <div class="space-y-2">
            <label
              class="text-[10px] font-extrabold uppercase tracking-widest text-gray-400"
              >Login</label
            >
            <input
              id="emailInput"
              type="email"
              class="custom-input"
              placeholder="Email ou número de telefone"
              required
            />
          </div>

          <div class="space-y-2">
            <label
              class="text-[10px] font-extrabold uppercase tracking-widest text-gray-400"
              >Senha</label
            >
            <input
              id="passwordInput"
              type="password"
              class="custom-input"
              placeholder="Digite sua senha"
              required
            />
          </div>

          <div class="flex items-center justify-between py-2">
            <div class="flex items-center gap-3">
              <div class="switch"></div>
              <span class="text-[11px] font-bold text-gray-400 uppercase"
                >Lembrar-me</span
              >
            </div>
            <a href="#" class="text-[11px] font-bold text-blue-600 uppercase"
              >Esqueceu a senha?</a
            >
          </div>

          <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <div class="mt-8 text-center">
          <p class="text-[12px] font-bold text-gray-400">
            Não tem uma conta?
            <a href="#" class="text-blue-600 ml-1">Cadastre-se agora</a>
          </p>
        </div>

        <div class="mt-auto flex justify-between items-center opacity-30">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-blue-600 rounded-full"></div>
            <span class="text-[9px] font-black uppercase"
              >campusconnect.edu</span
            >
          </div>
          <span class="text-[9px] font-black uppercase">© 2026</span>
        </div>
      </div>
    </div>

    <script>
      function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById("emailInput").value;
        const password = document.getElementById("passwordInput").value;

        // Validação simples
        if (!email || !password) {
          alert("Por favor, preencha todos os campos!");
          return;
        }

        if (password.length < 3) {
          alert("Senha deve ter pelo menos 3 caracteres!");
          return;
        }

        // Lógica mockada de autenticação
        // Se o email contém "admin", redireciona para painel admin
        if (email.toLowerCase().includes("admin")) {
          localStorage.setItem("userRole", "admin");
          localStorage.setItem("userEmail", email);
          window.location.href = "geral-admin.html";
        } else {
          // Caso contrário, redireciona para painel de aluno
          localStorage.setItem("userRole", "aluno");
          localStorage.setItem("userEmail", email);
          window.location.href = "index.html";
        }
      }
    </script>
  </body>
</html>
